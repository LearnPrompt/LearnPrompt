<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Durable Markdown handoff packet contract</title>
  <desc id="desc">A teaching diagram showing durable record fields flowing into a fresh agent that writes cited handoff outputs, plus rejection branches 41, 42, 43, and 44.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f6ef" />
      <stop offset="100%" stop-color="#efe6d1" />
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#274c77" />
      <stop offset="100%" stop-color="#4d7ea8" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efb366" />
      <stop offset="100%" stop-color="#d98f3e" />
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a7d44" />
      <stop offset="100%" stop-color="#5da85f" />
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8f2d2d" />
      <stop offset="100%" stop-color="#c44a4a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#5f4c2f" flood-opacity="0.18" />
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#274c77" />
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#3a7d44" />
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#8f2d2d" />
    </marker>
  </defs>

  <rect width="1400" height="900" rx="32" fill="url(#bg)" />
  <circle cx="188" cy="162" r="118" fill="#fff8ea" opacity="0.85" />
  <circle cx="1198" cy="120" r="140" fill="#fff1d8" opacity="0.8" />
  <circle cx="1280" cy="730" r="176" fill="#f2dcc2" opacity="0.65" />

  <text x="92" y="92" font-family="Helvetica" font-size="40" fill="#1e2f3a">Markdown handoff packet</text>
  <text x="92" y="128" font-family="Helvetica" font-size="20" fill="#4a5f68">Durable fields in files, explicit read step, cited output, hard rejects.</text>

  <rect x="90" y="178" width="350" height="512" rx="28" fill="#fffdf8" stroke="#c9b48b" stroke-width="2" filter="url(#shadow)" />
  <rect x="116" y="208" width="298" height="72" rx="18" fill="url(#gold)" />
  <text x="138" y="252" font-family="Helvetica" font-size="26" font-weight="700" fill="#fffdf8">Packet index + records</text>
  <text x="138" y="320" font-family="Helvetica" font-size="22" fill="#23313a">MEMORY_INDEX.md</text>
  <text x="138" y="358" font-family="Helvetica" font-size="20" fill="#2f3f46">context.md</text>
  <text x="138" y="390" font-family="Helvetica" font-size="20" fill="#2f3f46">decision.md</text>
  <text x="138" y="422" font-family="Helvetica" font-size="20" fill="#2f3f46">runbook.md</text>
  <text x="138" y="454" font-family="Helvetica" font-size="20" fill="#2f3f46">status.md</text>

  <rect x="126" y="500" width="278" height="158" rx="22" fill="#f6efe1" stroke="#dcc59d" stroke-width="2" />
  <text x="146" y="538" font-family="Helvetica" font-size="22" font-weight="700" fill="#24323a">Required record fields</text>
  <text x="146" y="576" font-family="Helvetica" font-size="19" fill="#33454f">Status</text>
  <text x="274" y="576" font-family="Helvetica" font-size="19" fill="#33454f">Decision</text>
  <text x="146" y="608" font-family="Helvetica" font-size="19" fill="#33454f">Evidence path</text>
  <text x="274" y="608" font-family="Helvetica" font-size="19" fill="#33454f">Next command</text>
  <text x="146" y="640" font-family="Helvetica" font-size="19" fill="#33454f">Limitation</text>
  <text x="274" y="640" font-family="Helvetica" font-size="19" fill="#33454f">Scope + verified at</text>

  <rect x="518" y="238" width="364" height="268" rx="30" fill="url(#blue)" filter="url(#shadow)" />
  <text x="552" y="288" font-family="Helvetica" font-size="30" font-weight="700" fill="#f8fbff">Fresh agent read step</text>
  <text x="552" y="338" font-family="Helvetica" font-size="21" fill="#eef4ff">Read only the frozen packet.</text>
  <text x="552" y="372" font-family="Helvetica" font-size="21" fill="#eef4ff">Do not infer hidden context.</text>
  <text x="552" y="406" font-family="Helvetica" font-size="21" fill="#eef4ff">Copy answers from explicit fields.</text>
  <text x="552" y="440" font-family="Helvetica" font-size="21" fill="#eef4ff">Cite exact packet file paths.</text>
  <text x="552" y="474" font-family="Helvetica" font-size="21" fill="#eef4ff">Write only reports/handoff.*</text>

  <path d="M440 434 C476 434, 492 372, 518 372" fill="none" stroke="#274c77" stroke-width="8" marker-end="url(#arrowBlue)" />

  <rect x="956" y="168" width="344" height="430" rx="30" fill="#fffdf8" stroke="#c9b48b" stroke-width="2" filter="url(#shadow)" />
  <rect x="984" y="198" width="288" height="74" rx="18" fill="url(#green)" />
  <text x="1010" y="242" font-family="Helvetica" font-size="28" font-weight="700" fill="#f7fff7">Cited handoff output</text>
  <text x="992" y="322" font-family="Helvetica" font-size="22" fill="#22303a">reports/handoff.json</text>
  <text x="992" y="356" font-family="Helvetica" font-size="22" fill="#22303a">reports/handoff.md</text>
  <text x="992" y="412" font-family="Helvetica" font-size="20" fill="#33454f">Current status</text>
  <text x="992" y="444" font-family="Helvetica" font-size="20" fill="#33454f">Accepted decision</text>
  <text x="992" y="476" font-family="Helvetica" font-size="20" fill="#33454f">Rationale + evidence</text>
  <text x="992" y="508" font-family="Helvetica" font-size="20" fill="#33454f">Next command</text>
  <text x="992" y="536" font-family="Helvetica" font-size="20" fill="#33454f">Known limitation</text>
  <text x="992" y="568" font-family="Helvetica" font-size="20" fill="#33454f">Exact packet citations</text>

  <path d="M882 372 C916 372, 928 372, 956 372" fill="none" stroke="#3a7d44" stroke-width="8" marker-end="url(#arrowGreen)" />

  <text x="538" y="612" font-family="Helvetica" font-size="28" font-weight="700" fill="#24323a">Reject invalid "memory"</text>
  <text x="538" y="648" font-family="Helvetica" font-size="19" fill="#4a5f68">A durable packet needs hard gates, not vibes.</text>

  <rect x="522" y="684" width="176" height="122" rx="24" fill="url(#red)" filter="url(#shadow)" />
  <rect x="724" y="684" width="176" height="122" rx="24" fill="url(#red)" filter="url(#shadow)" />
  <rect x="926" y="684" width="176" height="122" rx="24" fill="url(#red)" filter="url(#shadow)" />
  <rect x="1128" y="684" width="176" height="122" rx="24" fill="url(#red)" filter="url(#shadow)" />

  <text x="548" y="734" font-family="Helvetica" font-size="36" font-weight="700" fill="#fff8f8">41</text>
  <text x="548" y="772" font-family="Helvetica" font-size="18" fill="#fff8f8">Missing evidence</text>
  <text x="548" y="796" font-family="Helvetica" font-size="18" fill="#fff8f8">or provenance</text>

  <text x="750" y="734" font-family="Helvetica" font-size="36" font-weight="700" fill="#fff8f8">42</text>
  <text x="750" y="772" font-family="Helvetica" font-size="18" fill="#fff8f8">Status/decision</text>
  <text x="750" y="796" font-family="Helvetica" font-size="18" fill="#fff8f8">contradict each other</text>

  <text x="952" y="734" font-family="Helvetica" font-size="36" font-weight="700" fill="#fff8f8">43</text>
  <text x="952" y="772" font-family="Helvetica" font-size="18" fill="#fff8f8">Structured sensitive</text>
  <text x="952" y="796" font-family="Helvetica" font-size="18" fill="#fff8f8">marker present</text>

  <text x="1154" y="734" font-family="Helvetica" font-size="36" font-weight="700" fill="#fff8f8">44</text>
  <text x="1154" y="772" font-family="Helvetica" font-size="18" fill="#fff8f8">Binary-only or</text>
  <text x="1154" y="796" font-family="Helvetica" font-size="18" fill="#fff8f8">non-text "memory"</text>

  <path d="M698 542 C698 598, 610 620, 610 684" fill="none" stroke="#8f2d2d" stroke-width="7" marker-end="url(#arrowRed)" />
  <path d="M744 542 C744 596, 812 620, 812 684" fill="none" stroke="#8f2d2d" stroke-width="7" marker-end="url(#arrowRed)" />
  <path d="M790 542 C790 596, 1014 620, 1014 684" fill="none" stroke="#8f2d2d" stroke-width="7" marker-end="url(#arrowRed)" />
  <path d="M836 542 C836 596, 1216 620, 1216 684" fill="none" stroke="#8f2d2d" stroke-width="7" marker-end="url(#arrowRed)" />

  <text x="92" y="846" font-family="Helvetica" font-size="18" fill="#5c4a32">Original LearnPrompt diagram. License: CC BY-NC-SA 4.0.</text>
</svg>
