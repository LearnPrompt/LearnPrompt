<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Release readiness checklist gate for a small npm CLI</title>
  <desc id="desc">A teaching diagram showing vague checkbox to evidence row to severity to release decision, with exit codes 0, 21, 22, 23, and 24.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="good" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <style>
      .sans { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; }
      .title { font-size: 36px; font-weight: 700; fill: #7c2d12; }
      .label { font-size: 20px; font-weight: 700; fill: #7c2d12; }
      .body { font-size: 18px; fill: #431407; }
      .small { font-size: 16px; fill: #7c2d12; }
      .pill { fill: #ffffff; stroke: #fdba74; stroke-width: 2; rx: 18; }
      .box { fill: #fffaf5; stroke: #fdba74; stroke-width: 3; rx: 24; }
      .code { font-size: 16px; fill: #fffbeb; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="48" y="48" width="1304" height="804" rx="28" fill="#fffdf8" stroke="#fed7aa" stroke-width="4"/>
  <text x="82" y="112" class="sans title">Checklist Skill：把 release gate 写成结构化证据链</text>
  <text x="82" y="148" class="sans body">fixture: clip-clean v1.4.0 · dry-run only · release-readiness-checklist</text>

  <rect x="82" y="196" width="274" height="234" class="box"/>
  <text x="108" y="236" class="sans label">1. Vague checkbox</text>
  <rect x="108" y="264" width="222" height="48" class="pill"/>
  <text x="128" y="294" class="sans body">检查 changelog</text>
  <rect x="108" y="326" width="222" height="48" class="pill"/>
  <text x="128" y="356" class="sans body">看看版本是否一致</text>
  <rect x="108" y="382" width="222" height="48" class="pill"/>
  <text x="128" y="412" class="sans body">安装命令大概能跑</text>
  <text x="108" y="468" class="sans small">问题：没有证据、没有通过规则、没有严重级别，</text>
  <text x="108" y="492" class="sans small">Agent 最后只能写“看起来没问题”。</text>

  <path d="M382 314 C430 314, 430 314, 474 314" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M382 408 C430 408, 430 408, 474 408" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect x="474" y="196" width="458" height="526" class="box"/>
  <text x="500" y="236" class="sans label">2. Evidence row</text>
  <text x="500" y="274" class="sans body">每一行都要冻结七个字段：</text>
  <rect x="500" y="296" width="404" height="112" rx="20" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="520" y="326" class="mono body">id · question · evidence</text>
  <text x="520" y="352" class="mono body">pass_rule · severity · result</text>
  <text x="520" y="378" class="mono body">not_applicable_policy</text>
  <rect x="500" y="420" width="404" height="104" rx="20" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="454" class="sans body">CHANGELOG-21</text>
  <text x="520" y="482" class="sans small">evidence: CHANGELOG.md 缺失</text>
  <text x="520" y="506" class="sans small">pass_rule: 必须存在 1.4.0 段落并列出用户可见变更</text>
  <rect x="500" y="548" width="404" height="148" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="520" y="582" class="sans body">INSTALL-23</text>
  <text x="520" y="610" class="sans small">evidence: release/install-command.txt = npm run release:smoke</text>
  <text x="520" y="634" class="sans small">pass_rule: 本地打包 tarball 后可安装并执行 clip-clean --help</text>
  <text x="520" y="658" class="sans small">N/A policy: 只有 repo 证明没有 CLI surface 时才允许豁免</text>

  <path d="M958 456 C1016 456, 1016 456, 1068 456" fill="none" stroke="#c2410c" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1068" y="196" width="246" height="526" class="box"/>
  <text x="1094" y="236" class="sans label">3. Severity → decision</text>
  <rect x="1094" y="270" width="194" height="54" rx="18" fill="url(#good)"/>
  <text x="1116" y="304" class="mono code">ready = 0</text>
  <rect x="1094" y="346" width="194" height="54" rx="18" fill="url(#bad)"/>
  <text x="1116" y="380" class="mono code">CHANGELOG = 21</text>
  <rect x="1094" y="422" width="194" height="54" rx="18" fill="url(#bad)"/>
  <text x="1116" y="456" class="mono code">VERSION = 22</text>
  <rect x="1094" y="498" width="194" height="54" rx="18" fill="url(#warn)"/>
  <text x="1116" y="532" class="mono code">INSTALL = 23</text>
  <rect x="1094" y="574" width="194" height="54" rx="18" fill="url(#bad)"/>
  <text x="1116" y="608" class="mono code">N/A EVIDENCE = 24</text>
  <rect x="1094" y="650" width="194" height="54" rx="18" fill="url(#good)"/>
  <text x="1116" y="684" class="mono code">PRIVACY = 0</text>

  <rect x="82" y="746" width="1232" height="78" rx="24" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="110" y="780" class="sans body">链路：vague checkbox → evidence row → severity → release decision。</text>
  <text x="110" y="808" class="sans body">任何一环缺席，checklist 都会退回“像是做了审查”，而不是可 replay 的 gate。</text>
</svg>
