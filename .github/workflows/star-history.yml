name: Update Star History Chart

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate star history SVG
        env:
          # The built-in GITHUB_TOKEN cannot read other repos' stargazers
          # ("Resource not accessible by integration"). Set a classic PAT
          # with public_repo read as STAR_HISTORY_TOKEN to enable weekly
          # auto-refresh across all four repos.
          GITHUB_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 scripts/star_history.py

      - name: Guard against partial chart
        # If any repo fetch failed the SVG has fewer than 4 lines — keep
        # the previous good chart instead of clobbering it.
        run: |
          LINES=$(python3 -c "import re;print(len(re.findall('<polyline', open('assets/star-history.svg').read())))")
          echo "polylines: $LINES"
          if [ "$LINES" -lt 4 ]; then
            echo "Partial chart ($LINES/4 lines) — reverting, keeping previous SVG."
            git checkout -- assets/star-history.svg
          fi

      - name: Commit and push if changed
        # main is a protected branch (PR-only + deployment check), so the
        # chart lives on a dedicated `star-history` branch that the bot
        # force-pushes. READMEs reference the raw URL of that branch.
        run: |
          if [ -n "$(git status --porcelain assets/star-history.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -B star-history
            git add assets/star-history.svg
            git commit -m "chore: update star history chart"
            git push --force origin star-history
          else
            echo "No changes to star history chart."
          fi
