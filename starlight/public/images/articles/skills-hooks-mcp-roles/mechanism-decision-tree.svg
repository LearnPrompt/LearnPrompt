<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="svg-title svg-desc">
  <title id="svg-title">需求分类决策树：从问题出发选择 Skill、Hook 或 MCP</title>
  <desc id="svg-desc">从三个判定问题出发，引导读者选择 Skill（重复工作流）、Hook（事件时点保证）或 MCP（外部系统/数据），并标出组合边界与误用红线。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#fafaf9"/>

  <!-- 标题区 -->
  <text x="600" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#0f172a">你的扩展需求属于哪一类？</text>
  <text x="600" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">从三个判定问题出发，找到正确机制；答案可组合，但不可混淆</text>

  <!-- Q1: 外部系统/数据？ -->
  <g transform="translate(600 130)">
    <rect x="-175" y="-28" width="350" height="56" rx="0" fill="#fff" stroke="#334155" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Q1 需要访问外部系统或数据？</text>
  </g>
  <!-- Q1 -> yes -> MCP -->
  <line x1="775" y1="130" x2="990" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="880" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#16a34a" font-weight="600">是</text>
  <g transform="translate(1065 130)">
    <rect x="-65" y="-30" width="130" height="60" rx="0" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e40af">MCP</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">跨进程 / 外部数据</text>
  </g>

  <!-- Q1 -> no -> Q2 -->
  <line x1="600" y1="158" x2="600" y2="232" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="614" y="200" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626" font-weight="600">否</text>

  <!-- Q2: 事件时点保证？ -->
  <g transform="translate(600 260)">
    <rect x="-195" y="-28" width="390" height="56" rx="0" fill="#fff" stroke="#334155" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Q2 需要在特定事件时点做保证？</text>
  </g>
  <!-- Q2 -> yes -> Hook -->
  <line x1="795" y1="260" x2="990" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="890" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#16a34a" font-weight="600">是</text>
  <g transform="translate(1065 260)">
    <rect x="-65" y="-30" width="130" height="60" rx="0" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#92400e">Hook</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">事件拦截 / 保证</text>
  </g>

  <!-- Q2 -> no -> Q3 -->
  <line x1="600" y1="288" x2="600" y2="362" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="614" y="330" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626" font-weight="600">否</text>

  <!-- Q3: 重复工作流？ -->
  <g transform="translate(600 390)">
    <rect x="-175" y="-28" width="350" height="56" rx="0" fill="#fff" stroke="#334155" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Q3 同一套步骤需要反复执行？</text>
  </g>
  <!-- Q3 -> yes -> Skill -->
  <line x1="775" y1="390" x2="990" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="880" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#16a34a" font-weight="600">是</text>
  <g transform="translate(1065 390)">
    <rect x="-65" y="-30" width="130" height="60" rx="0" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#166534">Skill</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">固化的可复用流程</text>
  </g>

  <!-- Q3 -> no -> CLAUDE.md -->
  <line x1="600" y1="418" x2="600" y2="472" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="614" y="450" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626" font-weight="600">否</text>
  <g transform="translate(600 500)">
    <rect x="-120" y="-24" width="240" height="48" rx="0" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#475569">写进 CLAUDE.md 即可</text>
  </g>

  <!-- 组合边界区 -->
  <g transform="translate(45 570)">
    <rect width="520" height="180" rx="0" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#166534">合法组合</text>
    <text x="20" y="56" font-family="system-ui, sans-serif" font-size="14" fill="#334155">Skill 调 MCP tool 取外部数据 → Skill + MCP</text>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="14" fill="#334155">Hook 在 PreToolUse 阻止后 → Skill 兜底处理</text>
    <text x="20" y="104" font-family="system-ui, sans-serif" font-size="14" fill="#334155">MCP server 提供 tool → Hook 拦截 MCP tool 调用</text>
    <text x="20" y="140" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" font-style="italic">三种机制的边界是独立的：Skill 管流程、</text>
    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" font-style="italic">Hook 管时点保证、MCP 管数据通道。</text>
  </g>

  <!-- 误用红线区 -->
  <g transform="translate(600 570)">
    <rect width="560" height="180" rx="0" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#991b1b">误用红线</text>
    <line x1="20" y1="52" x2="32" y2="64" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="32" y1="52" x2="20" y2="64" stroke="#ef4444" stroke-width="2.5"/>
    <text x="42" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#334155">纯本地固定流程包装成 MCP → 增加进程/信任/凭据边界</text>
    <line x1="20" y1="82" x2="32" y2="94" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="32" y1="82" x2="20" y2="94" stroke="#ef4444" stroke-width="2.5"/>
    <text x="42" y="94" font-family="system-ui, sans-serif" font-size="14" fill="#334155">用 Hook 实现复杂业务逻辑 → 难调试、无上下文</text>
    <line x1="20" y1="112" x2="32" y2="124" stroke="#ef4444" stroke-width="2.5"/>
    <line x1="32" y1="112" x2="20" y2="124" stroke="#ef4444" stroke-width="2.5"/>
    <text x="42" y="124" font-family="system-ui, sans-serif" font-size="14" fill="#334155">把 Skill 当 CLAUDE.md → 始终加载、浪费上下文</text>
    <text x="20" y="160" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" font-style="italic">每条误用在 Showcase 中都有机械反例或</text>
    <text x="20" y="178" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" font-style="italic">退出码证据——不是主观建议。</text>
  </g>
</svg>
