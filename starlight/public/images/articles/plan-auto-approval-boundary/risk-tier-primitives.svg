<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif">
  <rect width="900" height="620" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="899" height="619" fill="none" stroke="#111111" stroke-width="1"/>

  <!-- title -->
  <text x="32" y="46" font-size="22" font-weight="700" fill="#111111">按任务风险划三档边界，两套工具用不同原语实现</text>
  <text x="32" y="72" font-size="14" fill="#555555">边界由 harness 或 OS 沙箱强制，不由"我信任这个模型"决定</text>

  <!-- column headers -->
  <text x="56" y="112" font-size="13" font-weight="700" fill="#111111">风险档与判断依据</text>
  <text x="380" y="112" font-size="13" font-weight="700" fill="#111111">Claude Code 原语</text>
  <text x="640" y="112" font-size="13" font-weight="700" fill="#111111">Codex 原语</text>
  <line x1="32" y1="122" x2="868" y2="122" stroke="#111111" stroke-width="1"/>

  <!-- risk axis label -->
  <text x="20" y="330" font-size="12" fill="#B45309" transform="rotate(-90 20 330)">风险从下往上升高</text>

  <!-- Tier 1: read-only plan -->
  <rect x="40" y="138" width="828" height="120" fill="#ffffff" stroke="#111111" stroke-width="1"/>
  <rect x="40" y="138" width="6" height="120" fill="#111111"/>
  <text x="64" y="168" font-size="15" font-weight="700" fill="#111111">① 只读计划</text>
  <text x="64" y="192" font-size="12" fill="#333333">读文件、grep、跑只读命令</text>
  <text x="64" y="212" font-size="12" fill="#333333">先把任务看清楚，不改盘</text>
  <text x="64" y="236" font-size="11" fill="#B45309">默认放行，无需批准</text>
  <text x="380" y="180" font-size="13" fill="#111111">plan 模式</text>
  <text x="380" y="204" font-size="11" fill="#555555">只读探索，不改源文件</text>
  <text x="380" y="224" font-size="11" fill="#555555">由 Claude Code 进程强制</text>
  <text x="620" y="180" font-size="13" fill="#111111">read-only 沙箱</text>
  <text x="620" y="204" font-size="11" fill="#555555">工作区写入由 OS 拒绝</text>
  <text x="620" y="224" font-size="11" fill="#555555">由 OS 沙箱强制</text>

  <!-- Tier 2: normal auto execution -->
  <rect x="40" y="268" width="828" height="120" fill="#ffffff" stroke="#111111" stroke-width="1"/>
  <rect x="40" y="268" width="6" height="120" fill="#111111"/>
  <text x="64" y="298" font-size="15" font-weight="700" fill="#111111">② 普通自动执行</text>
  <text x="64" y="322" font-size="12" fill="#333333">改工作区文件、跑测试</text>
  <text x="64" y="342" font-size="12" fill="#333333">可撤销、影响半径在仓库内</text>
  <text x="64" y="366" font-size="11" fill="#B45309">可交给自动执行</text>
  <text x="380" y="310" font-size="13" fill="#111111">acceptEdits + allow 规则</text>
  <text x="380" y="334" font-size="11" fill="#555555">对 Edit 与安全 Bash 放行</text>
  <text x="380" y="354" font-size="11" fill="#555555">如 allow Bash(npm run *)</text>
  <text x="620" y="310" font-size="13" fill="#111111">workspace-write 沙箱</text>
  <text x="620" y="334" font-size="11" fill="#555555">工作区内写入放行</text>
  <text x="620" y="354" font-size="11" fill="#555555">联网未随之自动放开</text>

  <!-- Tier 3: high-risk human approval -->
  <rect x="40" y="398" width="828" height="150" fill="#ffffff" stroke="#111111" stroke-width="1"/>
  <rect x="40" y="398" width="6" height="150" fill="#B45309"/>
  <text x="64" y="428" font-size="15" font-weight="700" fill="#B45309">③ 高风险动作</text>
  <text x="64" y="452" font-size="12" fill="#333333">push、删除、部署、改密钥</text>
  <text x="64" y="472" font-size="12" fill="#333333">联网、写工作区之外</text>
  <text x="64" y="492" font-size="12" fill="#333333">不可逆或影响外部系统</text>
  <text x="64" y="522" font-size="11" fill="#B45309">必须人工批准，且要有回滚</text>
  <text x="380" y="440" font-size="13" fill="#111111">ask / deny 规则</text>
  <text x="380" y="464" font-size="11" fill="#555555">如 deny Bash(git push *)</text>
  <text x="380" y="486" font-size="11" fill="#555555">deny 压过 allow，进程强制</text>
  <text x="620" y="440" font-size="13" fill="#111111">无单一确定性开关</text>
  <text x="620" y="464" font-size="11" fill="#555555">untrusted 仅作额外门禁</text>
  <text x="620" y="486" font-size="11" fill="#555555">停下任务，由人显式授权</text>

  <!-- footnote -->
  <text x="32" y="580" font-size="11" fill="#555555">plan 模式（应用层）与 read-only 沙箱（OS 层）都表现为只读，但强制层不同，术语不能互换。</text>
  <text x="32" y="600" font-size="11" fill="#555555">核对来源：Claude Code 2.1.206 与 Codex CLI 0.142.2 的 --help 及官方文档，2026-07-11。</text>
</svg>
