<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Loop Engineering 五动作闭环</title>
  <desc id="desc">发现、交接、验证、持久化和调度依次推进；验证结果先被持久化，调度再让下一轮从证据继续发现。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect width="1200" height="675" rx="28" fill="#fff7ed"/>
  <text x="600" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#0f172a">五个动作把一次运行变成下一轮可继续的 Loop</text>
  <text x="600" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="21" fill="#475569">每一步都产生下一步能够读取的结构化证据</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(45 260)"><rect width="190" height="155" rx="24" fill="#ffedd5" stroke="#f97316" stroke-width="4"/><text x="95" y="62" text-anchor="middle" font-size="30" font-weight="700" fill="#9a3412">发现</text><text x="95" y="102" text-anchor="middle" font-size="18" fill="#475569">任务从哪里来</text><text x="95" y="130" text-anchor="middle" font-size="17" fill="#64748b">筛选 · 去重</text></g>
    <g transform="translate(275 260)"><rect width="190" height="155" rx="24" fill="#fef3c7" stroke="#f59e0b" stroke-width="4"/><text x="95" y="62" text-anchor="middle" font-size="30" font-weight="700" fill="#92400e">交接</text><text x="95" y="102" text-anchor="middle" font-size="18" fill="#475569">给谁、给什么</text><text x="95" y="130" text-anchor="middle" font-size="17" fill="#64748b">任务卡 · 验收</text></g>
    <g transform="translate(505 260)"><rect width="190" height="155" rx="24" fill="#fee2e2" stroke="#ef4444" stroke-width="4"/><text x="95" y="62" text-anchor="middle" font-size="30" font-weight="700" fill="#991b1b">验证</text><text x="95" y="102" text-anchor="middle" font-size="18" fill="#475569">结果是否合格</text><text x="95" y="130" text-anchor="middle" font-size="17" fill="#64748b">测试 · review</text></g>
    <g transform="translate(735 260)"><rect width="190" height="155" rx="24" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/><text x="95" y="62" text-anchor="middle" font-size="30" font-weight="700" fill="#166534">持久化</text><text x="95" y="102" text-anchor="middle" font-size="18" fill="#475569">下一轮记住什么</text><text x="95" y="130" text-anchor="middle" font-size="17" fill="#64748b">状态 · 工件</text></g>
    <g transform="translate(965 260)"><rect width="190" height="155" rx="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="4"/><text x="95" y="62" text-anchor="middle" font-size="30" font-weight="700" fill="#1e40af">调度</text><text x="95" y="102" text-anchor="middle" font-size="18" fill="#475569">继续、重试或停止</text><text x="95" y="130" text-anchor="middle" font-size="17" fill="#64748b">时间 · 条件</text></g>
  </g>
  <g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"><path d="M235 338 H270"/><path d="M465 338 H500"/><path d="M695 338 H730"/><path d="M925 338 H960"/><path d="M1060 250 C1060 150 140 150 140 250"/></g>
  <rect x="275" y="500" width="650" height="92" rx="46" fill="#0f172a"/>
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#fdba74">Loop 的判定标准</text>
  <text x="600" y="572" text-anchor="middle" font-family="system-ui, sans-serif" font-size="25" font-weight="700" fill="white">下一轮从证据继续，而不是从提示词重新开始</text>
</svg>
