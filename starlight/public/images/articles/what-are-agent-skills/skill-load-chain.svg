<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill loading chain from one-time prompt to verified output</title>
  <desc id="desc">A five-step teaching diagram showing how a user prompt triggers skill metadata, then the skill body, then references and scripts, and finally produces a verified dry-run output.</desc>
  <defs>
    <linearGradient id="bg" x1="90" y1="70" x2="1310" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E3"/>
      <stop offset="0.45" stop-color="#E2F0E8"/>
      <stop offset="1" stop-color="#D9E8F8"/>
    </linearGradient>
    <linearGradient id="cardWarm" x1="0" y1="0" x2="280" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6D8"/>
      <stop offset="1" stop-color="#FDE7A9"/>
    </linearGradient>
    <linearGradient id="cardMint" x1="0" y1="0" x2="280" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F7EF"/>
      <stop offset="1" stop-color="#BEE5CF"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="280" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF2FB"/>
      <stop offset="1" stop-color="#C8DCF5"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#314559" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="10" refY="8" orient="auto">
      <path d="M0 0L16 8L0 16V0Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1360" height="860" rx="36" fill="url(#bg)"/>
  <rect x="70" y="60" width="1260" height="780" rx="28" fill="#FFFCF5" stroke="#D6D3D1" stroke-width="2"/>

  <text x="110" y="122" fill="#16202A" font-size="42" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Agent Skill 不是更长的 prompt，而是一条按需加载的工作包链路</text>
  <text x="110" y="165" fill="#475569" font-size="22" font-family="IBM Plex Sans, Arial, sans-serif">左到右：一次性意图先决定“这次要做什么”，再逐层拉起 metadata、正文、参考资料与确定性脚本，最后才产出可验收结果。</text>

  <g filter="url(#shadow)">
    <rect x="110" y="235" width="220" height="245" rx="24" fill="url(#cardWarm)" stroke="#C0841A" stroke-width="2"/>
    <rect x="380" y="235" width="220" height="245" rx="24" fill="url(#cardMint)" stroke="#3A7D57" stroke-width="2"/>
    <rect x="650" y="235" width="220" height="245" rx="24" fill="url(#cardMint)" stroke="#3A7D57" stroke-width="2"/>
    <rect x="920" y="235" width="220" height="245" rx="24" fill="url(#cardBlue)" stroke="#2F6EA8" stroke-width="2"/>
    <rect x="1180" y="235" width="150" height="245" rx="24" fill="url(#cardBlue)" stroke="#2F6EA8" stroke-width="2"/>
  </g>

  <text x="135" y="285" fill="#92400E" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">1. Prompt</text>
  <text x="135" y="322" fill="#1F2937" font-size="28" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">这次的意图</text>
  <text x="135" y="364" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">例如：</text>
  <text x="135" y="394" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">“处理 normal-batch，</text>
  <text x="135" y="423" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">做 dry-run 计划，</text>
  <text x="135" y="452" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">再跑测试。”</text>

  <text x="405" y="285" fill="#166534" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">2. Skill metadata</text>
  <text x="405" y="322" fill="#1F2937" font-size="28" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">何时该唤起</text>
  <text x="405" y="364" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">`name` + `description`</text>
  <text x="405" y="393" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">先进入上下文，决定</text>
  <text x="405" y="422" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">“这是不是收据</text>
  <text x="405" y="451" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">重命名工作包？”</text>

  <text x="675" y="285" fill="#166534" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">3. Skill body</text>
  <text x="675" y="322" fill="#1F2937" font-size="28" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">进入后怎么协调</text>
  <text x="675" y="364" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">确认 dry run</text>
  <text x="675" y="393" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">读取命名政策</text>
  <text x="675" y="422" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">调用脚本</text>
  <text x="675" y="451" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">解释 exit code</text>

  <text x="945" y="285" fill="#1D4E89" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">4. Resources</text>
  <text x="945" y="322" fill="#1F2937" font-size="28" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">细节按需加载</text>
  <text x="945" y="364" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">references/</text>
  <text x="945" y="393" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">scripts/</text>
  <text x="945" y="422" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">assets/</text>
  <text x="945" y="451" fill="#334155" font-size="19" font-family="IBM Plex Sans, Arial, sans-serif">脚本只做确定性转换</text>

  <text x="1198" y="285" fill="#1D4E89" font-size="20" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">5. Output</text>
  <text x="1198" y="322" fill="#1F2937" font-size="23" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">可验收结果</text>
  <text x="1198" y="364" fill="#334155" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">dry-run</text>
  <text x="1198" y="392" fill="#334155" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">plan.json</text>
  <text x="1198" y="420" fill="#334155" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">plan.md</text>
  <text x="1198" y="448" fill="#334155" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">tests</text>

  <path d="M330 334H380" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 334H650" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M870 334H920" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1140 334H1180" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="110" y="525" width="1220" height="250" rx="26" fill="#FFF7ED" stroke="#E2A663" stroke-width="2"/>
  <text x="145" y="576" fill="#9A3412" font-size="24" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">为什么这不是“脚本 = Skill”</text>

  <rect x="145" y="610" width="345" height="125" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="170" y="645" fill="#1F2937" font-size="22" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Prompt 负责这次要做什么</text>
  <text x="170" y="680" fill="#475569" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">它是单次意图，不负责以后</text>
  <text x="170" y="707" fill="#475569" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">怎样被发现或重复调用。</text>

  <rect x="525" y="610" width="345" height="125" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="550" y="645" fill="#1F2937" font-size="22" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Skill 负责工作流和边界</text>
  <text x="550" y="680" fill="#475569" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">它解释何时使用、何时停止、</text>
  <text x="550" y="707" fill="#475569" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">失败码怎么读、报告写到哪里。</text>

  <rect x="905" y="610" width="390" height="125" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="930" y="645" fill="#1F2937" font-size="22" font-family="IBM Plex Sans, Arial, sans-serif" font-weight="700">Script 负责确定性转换</text>
  <text x="930" y="680" fill="#475569" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">日期、金额、slug、冲突检查</text>
  <text x="930" y="707" fill="#475569" font-size="18" font-family="IBM Plex Sans, Arial, sans-serif">都应稳定重放，而不是靠模型猜。</text>
</svg>
