name: Starlight Build

on:
  pull_request:
    paths:
      - "starlight/**"
      - ".github/workflows/starlight-build.yml"
  push:
    branches:
      - codex/starlight-wiki-migration
    paths:
      - "starlight/**"
      - ".github/workflows/starlight-build.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: starlight

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  build:
    name: Build Starlight site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: starlight/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build
