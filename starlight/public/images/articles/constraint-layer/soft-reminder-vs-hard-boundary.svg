<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">软约束与硬边界的对照，以及多层防线如何拦截禁止动作</title>
  <desc id="desc">同一个禁止动作在只有文字提醒时被放行，在经过路径/命令 deny 规则、执行前钩子、操作系统沙箱三层硬边界时被拒绝；合法动作在同一套硬边界下照常通过。</desc>
  <rect width="1200" height="720" rx="28" fill="#fff7ed"/>
  <text x="600" y="66" text-anchor="middle" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#0f172a">约束层：把“不要”从软提醒变成可执行边界</text>
  <text x="600" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="21" fill="#475569">同一个禁止动作，取决于约束是文字还是强制</text>

  <g font-family="system-ui, sans-serif">
    <!-- 上路：软约束 -->
    <g transform="translate(45 150)">
      <rect width="150" height="86" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="75" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#991b1b">禁止动作</text>
      <text x="75" y="66" text-anchor="middle" font-size="15" fill="#64748b">写 config/app.env</text>
    </g>
    <line x1="195" y1="193" x2="255" y2="193" stroke="#94a3b8" stroke-width="3"/>
    <polygon points="255,187 267,193 255,199" fill="#94a3b8"/>
    <g transform="translate(267 150)">
      <rect width="300" height="86" rx="16" fill="#fff7ed" stroke="#f59e0b" stroke-width="3" stroke-dasharray="9 7"/>
      <text x="150" y="37" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">软约束：AGENTS.md 文字提醒</text>
      <text x="150" y="65" text-anchor="middle" font-size="15" fill="#64748b">“不要碰 config/、不要 push”——仅表达意图</text>
    </g>
    <line x1="567" y1="193" x2="627" y2="193" stroke="#94a3b8" stroke-width="3"/>
    <polygon points="627,187 639,193 627,199" fill="#94a3b8"/>
    <g transform="translate(639 150)">
      <rect width="230" height="86" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="115" y="37" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">动作被执行 ✗</text>
      <text x="115" y="65" text-anchor="middle" font-size="15" fill="#64748b">边界失效，且无法验证</text>
    </g>
    <text x="984" y="182" text-anchor="middle" font-size="16" fill="#991b1b">文字拦不住</text>
    <text x="984" y="206" text-anchor="middle" font-size="16" fill="#991b1b">动作，也留不下证据</text>

    <!-- 下路：硬边界多层防线 -->
    <g transform="translate(45 320)">
      <rect width="150" height="86" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="75" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#991b1b">禁止动作</text>
      <text x="75" y="66" text-anchor="middle" font-size="15" fill="#64748b">写 config/app.env</text>
    </g>
    <line x1="195" y1="363" x2="248" y2="363" stroke="#0f172a" stroke-width="3"/>
    <polygon points="248,357 260,363 248,369" fill="#0f172a"/>

    <!-- 三层硬边界 -->
    <g transform="translate(260 300)">
      <rect width="196" height="126" rx="16" fill="#e0e7ff" stroke="#6366f1" stroke-width="3"/>
      <text x="98" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#3730a3">1 路径/命令权限</text>
      <text x="98" y="62" text-anchor="middle" font-size="14" fill="#475569">deny 规则匹配</text>
      <text x="98" y="84" text-anchor="middle" font-size="14" fill="#475569">config/*.env</text>
      <text x="98" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">→ DENY</text>
    </g>
    <line x1="456" y1="363" x2="474" y2="363" stroke="#0f172a" stroke-width="3"/>
    <g transform="translate(474 300)">
      <rect width="196" height="126" rx="16" fill="#e0e7ff" stroke="#6366f1" stroke-width="3"/>
      <text x="98" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#3730a3">2 执行前钩子</text>
      <text x="98" y="62" text-anchor="middle" font-size="14" fill="#475569">运行前判定</text>
      <text x="98" y="84" text-anchor="middle" font-size="14" fill="#475569">exit 2 阻断</text>
      <text x="98" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">→ DENY</text>
    </g>
    <line x1="670" y1="363" x2="688" y2="363" stroke="#0f172a" stroke-width="3"/>
    <g transform="translate(688 300)">
      <rect width="196" height="126" rx="16" fill="#e0e7ff" stroke="#6366f1" stroke-width="3"/>
      <text x="98" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#3730a3">3 操作系统沙箱</text>
      <text x="98" y="62" text-anchor="middle" font-size="14" fill="#475569">read-only 拒写</text>
      <text x="98" y="84" text-anchor="middle" font-size="14" fill="#475569">Operation not permitted</text>
      <text x="98" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">→ DENY</text>
    </g>
    <line x1="884" y1="363" x2="944" y2="363" stroke="#0f172a" stroke-width="3"/>
    <polygon points="944,357 956,363 944,369" fill="#0f172a"/>
    <g transform="translate(956 320)">
      <rect width="150" height="86" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
      <text x="75" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#991b1b">被拒绝 ✓</text>
      <text x="75" y="66" text-anchor="middle" font-size="14" fill="#64748b">任一层可拦下</text>
    </g>

    <!-- 合法动作通过 -->
    <g transform="translate(45 500)">
      <rect width="150" height="86" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
      <text x="75" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">合法动作</text>
      <text x="75" y="66" text-anchor="middle" font-size="15" fill="#64748b">写 docs/notes.md</text>
    </g>
    <line x1="195" y1="543" x2="944" y2="543" stroke="#22c55e" stroke-width="3" stroke-dasharray="2 0"/>
    <polygon points="944,537 956,543 944,549" fill="#22c55e"/>
    <text x="570" y="530" text-anchor="middle" font-size="16" fill="#166534">在同一套硬边界下：白名单内路径不被拦</text>
    <g transform="translate(956 500)">
      <rect width="150" height="86" rx="16" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
      <text x="75" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">通过 ✓</text>
      <text x="75" y="66" text-anchor="middle" font-size="14" fill="#64748b">ALLOW，可审计</text>
    </g>
  </g>

  <rect x="150" y="628" width="900" height="66" rx="33" fill="#0f172a"/>
  <text x="600" y="669" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">硬边界拦禁止动作，放行合法动作——不靠模型自觉，靠执行前判定与执行时沙箱</text>
</svg>
